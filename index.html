<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta
        name="viewport"
        content="width=device-width,initial-scale=1,viewport-fit=cover">

    <title>Milk Collection</title>

    <meta
        name="theme-color"
        content="#1565C0">

    <meta
        name="mobile-web-app-capable"
        content="yes">

    <meta
        name="apple-mobile-web-app-capable"
        content="yes">

    <meta
        name="apple-mobile-web-app-status-bar-style"
        content="default">

    <link
        rel="manifest"
        href="manifest.json">

    <link
        rel="stylesheet"
        href="css/variables.css">

    <link
        rel="stylesheet"
        href="css/base.css">

    <link
        rel="stylesheet"
        href="css/layout.css">

    <link
        rel="stylesheet"
        href="css/components.css">

    <link
        rel="stylesheet"
        href="css/responsive.css">

</head>

<body>

    <!-- Loading -->

    <div id="loading-screen">

        <div class="loader"></div>

        <div class="loading-text">

            Loading...

        </div>

    </div>

    <!-- Login -->

    <div
        id="login-screen"
        class="hidden">

        <div class="login-card">

            <div class="app-logo">
                🥛
            </div>

            <h1>

                श्री कृष्ण मिल्क कलेक्शन

            </h1>

            <select id="route-select">

                <option value="">
                    Select Delivery Path
                </option>

            </select>

            <input
                id="pin-input"
                type="password"
                maxlength="6"
                placeholder="PIN">

            <button id="login-button">

                Login

            </button>

            <div id="login-message"></div>

        </div>

    </div>

    <!-- Main Application -->

    <div
        id="app-screen"
        class="hidden">

        <header id="toolbar">

        </header>

        <main id="content">

        </main>

    </div>

    <!-- Toast -->

    <div id="toast">

    </div>

    <div
        id="floating-customer-name"
        class="hidden">

    </div>

    <script src="js/config.js"></script>

    <script src="js/storage.js"></script>

    <script src="js/utils.js"></script>

    <script src="js/api.js"></script>

    <script src="js/auth.js"></script>

    <script src="js/ui.js"></script>

    <script src="js/table.js"></script>

    <script src="js/billing.js"></script>

    <script src="js/app.js"></script>

</body>

</html>
